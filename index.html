<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Class PDF Summarizer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 20px;
      background: #fafafa;
      color: #1a1a1a;
    }
    h1 { font-size: 28px; margin-bottom: 4px; }
    .sub { color: #666; margin-bottom: 28px; font-size: 14px; }

    .drop {
      border: 2px dashed #c0c0c0;
      border-radius: 12px;
      padding: 48px 20px;
      text-align: center;
      background: #fff;
      cursor: pointer;
      transition: all 0.15s;
    }
    .drop:hover, .drop.drag { border-color: #4f46e5; background: #f5f3ff; }
    .drop input { display: none; }
    .drop p { margin: 8px 0; color: #555; }
    .drop strong { color: #4f46e5; }

    button {
      background: #4f46e5;
      color: #fff;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
    }
    button:disabled { background: #9ca3af; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #4338ca; }

    .status {
      margin-top: 20px;
      padding: 12px 16px;
      background: #fff;
      border-radius: 8px;
      border-left: 3px solid #4f46e5;
      font-size: 14px;
    }
    .status.error { border-left-color: #dc2626; color: #991b1b; }

    .results { margin-top: 28px; }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;
      border: 1px solid #e5e5e5;
    }
    .card h2 { margin: 0 0 12px 0; font-size: 18px; }
    .meta { color: #666; font-size: 13px; margin-bottom: 16px; }
    .summary { line-height: 1.7; font-size: 15px; }
    details { margin-top: 12px; }
    summary { cursor: pointer; color: #4f46e5; font-size: 14px; padding: 8px 0; }
    pre {
      background: #f5f5f5;
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      max-height: 400px;
      overflow-y: auto;
    }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid #ddd;
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>📚 Class PDF Summarizer</h1>
  <p class="sub">LLaVA-1.5 extracts text + visuals · BART-large-CNN summarizes</p>

  <label class="drop" id="drop">
    <input type="file" id="file" accept="application/pdf" />
    <p style="font-size: 32px; margin: 0;">📄</p>
    <p>Drop a PDF here or <strong>click to browse</strong></p>
    <p style="font-size: 12px; color: #999;">Max 50 MB</p>
  </label>

  <div id="filename" style="margin-top: 12px; font-size: 14px; color: #555;"></div>
  <button id="submit" disabled>Summarize</button>

  <div id="status" class="status" style="display: none;"></div>
  <div id="results" class="results"></div>

  <script>
    const drop = document.getElementById('drop');
    const fileInput = document.getElementById('file');
    const filenameEl = document.getElementById('filename');
    const submitBtn = document.getElementById('submit');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');

    let selectedFile = null;

    function setFile(file) {
      if (!file || file.type !== 'application/pdf') {
        alert('Please select a PDF file.');
        return;
      }
      selectedFile = file;
      filenameEl.textContent = `Selected: ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
      submitBtn.disabled = false;
    }

    fileInput.addEventListener('change', (e) => setFile(e.target.files[0]));

    ['dragover', 'dragenter'].forEach((ev) =>
      drop.addEventListener(ev, (e) => {
        e.preventDefault();
        drop.classList.add('drag');
      })
    );
    ['dragleave', 'drop'].forEach((ev) =>
      drop.addEventListener(ev, (e) => {
        e.preventDefault();
        drop.classList.remove('drag');
      })
    );
    drop.addEventListener('drop', (e) => {
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    submitBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      submitBtn.disabled = true;
      resultsEl.innerHTML = '';
      statusEl.style.display = 'block';
      statusEl.className = 'status';
      statusEl.innerHTML = '<span class="spinner"></span>Processing PDF... this may take a minute or two depending on page count.';

      const formData = new FormData();
      formData.append('pdf', selectedFile);

      try {
        const res = await fetch('/api/summarize', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) throw new Error(data.error || 'Request failed');

        statusEl.style.display = 'none';
        renderResults(data);
      } catch (err) {
        statusEl.className = 'status error';
        statusEl.textContent = `Error: ${err.message}`;
      } finally {
        submitBtn.disabled = false;
      }
    });

    function renderResults(data) {
      const pagesHtml = data.pages
        .map((p) => `<div style="margin-bottom: 16px;"><strong>Page ${p.page}</strong>\n${escapeHtml(p.text)}</div>`)
        .join('');

      resultsEl.innerHTML = `
        <div class="card">
          <h2>Summary</h2>
          <div class="meta">${data.pageCount} pages processed</div>
          <div class="summary">${escapeHtml(data.summary)}</div>
        </div>
        <div class="card">
          <details>
            <summary>View extracted text per page</summary>
            <pre>${pagesHtml}</pre>
          </details>
        </div>
      `;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }
  </script>
</body>
</html>
